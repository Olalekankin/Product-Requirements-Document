databases:
  - name: job-scout-db
    databaseName: job_scout
    user: job_scout_user
    plan: free

services:
  # 1. API Server & Frontend (Web Service)
  - type: web
    name: job-scout-web
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: job-scout-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: true
      - key: TWITTER_CLIENT_ID
        sync: true
      - key: LINKEDIN_CLIENT_ID
        sync: true
      - key: LINKEDIN_CLIENT_SECRET
        sync: true

  # 2. Agent Runner (Background Worker)
  - type: worker
    name: job-scout-agent
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/api-server run agent
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: job-scout-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: true
